name: Release Obsidian Plugin

on:
  push:
    # 只有当推送的 tag 符合 v* 格式时触发（例如 v1.0.1）
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Plugin
        run: npm run build

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # 自动根据 tag 生成 Release 名称
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          # 指定要上传到 Release 的三个核心文件
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}